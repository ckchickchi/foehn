<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>焚風模擬器 (Foehn Wind Simulator)</title>
    <!-- 載入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 與 Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:ital,wght@0,900;1,900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #E4E3E0;
            color: #0044F0; /* 恢復您的藍色配置 */
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        input[type="range"] {
            -webkit-appearance: none;
            background: rgba(40, 140, 220, 0.55); /* 恢復您的滑桿背景 */
            height: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #141414;
            cursor: pointer;
            border-radius: 0;
        }

        .simulation-container {
            touch-action: none;
        }

        /* 自定義切換開關樣式 */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #141414;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #141414;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        const DRY_LAPSE_RATE = 1.0; 
        const WET_LAPSE_RATE = 0.6; 
        const TD_LAPSE_RATE = 0.2;  

        function App() {
            const [initialTemp, setInitialTemp] = useState(30);
            const [initialDewPoint, setInitialDewPoint] = useState(20);
            const [mountainHeight, setMountainHeight] = useState(2000);
            const [dewPointChanges, setDewPointChanges] = useState(false);
            const [progress, setProgress] = useState(0); 

            const containerRef = useRef(null);
            const [isDragging, setIsDragging] = useState(false);

            // 山脈高度參考值：地平線 400，山頂 125 (縮小後的高度)
            const PEAK_Y = 125;
            const BASE_Y = 400;
            const VISUAL_HT = BASE_Y - PEAK_Y;

            const stats = useMemo(() => {
                const lapseDiff = dewPointChanges ? 0.008 : 0.01;
                const lcl = Math.max(0, (initialTemp - initialDewPoint) / lapseDiff);
                
                let temp, dewPoint, isSaturated = false;
                let h = 0;

                if (progress <= 1) { 
                    h = progress * mountainHeight;
                    if (h <= lcl) {
                        temp = initialTemp - (h / 100) * DRY_LAPSE_RATE;
                        dewPoint = dewPointChanges ? initialDewPoint - (h / 100) * TD_LAPSE_RATE : initialDewPoint;
                        isSaturated = false;
                    } else {
                        const tempAtLcl = initialTemp - (lcl / 100) * DRY_LAPSE_RATE;
                        temp = tempAtLcl - ((h - lcl) / 100) * WET_LAPSE_RATE;
                        dewPoint = temp;
                        isSaturated = true;
                    }
                } else { 
                    const peakH = mountainHeight;
                    let peakTemp, peakDewPoint;
                    
                    if (peakH <= lcl) {
                        peakTemp = initialTemp - (peakH / 100) * DRY_LAPSE_RATE;
                        peakDewPoint = dewPointChanges ? initialDewPoint - (peakH / 100) * TD_LAPSE_RATE : initialDewPoint;
                    } else {
                        const tempAtLcl = initialTemp - (lcl / 100) * DRY_LAPSE_RATE;
                        peakTemp = tempAtLcl - ((peakH - lcl) / 100) * WET_LAPSE_RATE;
                        peakDewPoint = peakTemp;
                    }

                    h = (2 - progress) * mountainHeight;
                    temp = peakTemp + ((peakH - h) / 100) * DRY_LAPSE_RATE;
                    dewPoint = dewPointChanges ? peakDewPoint + ((peakH - h) / 100) * TD_LAPSE_RATE : peakDewPoint;
                    isSaturated = false;
                }

                return {
                    temp: temp.toFixed(1),
                    dewPoint: dewPoint.toFixed(1),
                    height: Math.round(h),
                    isSaturated,
                    lcl: Math.round(lcl)
                };
            }, [progress, initialTemp, initialDewPoint, mountainHeight, dewPointChanges]);

            const handleMove = (clientX) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = ((clientX - rect.left) / rect.width) * 800;
                
                let p = 0;
                if (x < 100) p = 0;
                else if (x >= 100 && x <= 400) p = (x - 100) / 300;
                else if (x > 400 && x <= 700) p = 1 + (x - 400) / 300;
                else p = 2;

                setProgress(p);
            };

            const onMouseDown = (e) => { setIsDragging(true); handleMove(e.clientX); };
            const onMouseMove = (e) => { if (isDragging) handleMove(e.clientX); };
            const onMouseUp = () => setIsDragging(false);

            // 統一數字格式的組件
            const DataRow = ({ label, value, unit }) => (
                <div className="group">
                    <p className="text-[14px] font-black uppercase tracking-widest opacity-40 mb-2">{label}</p>
                    <div className="flex items-baseline gap-2">
                        <span className="text-5xl font-mono tracking-tighter leading-none text-[#0044F0]">
                            {value}
                        </span>
                        <span className="text-2xl font-serif italic opacity-30">{unit}</span>
                    </div>
                </div>
            );

            return (
                <div className="flex-grow flex flex-col select-none" onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
                    {/* 標題欄 */}
                    <header className="bg-white border-b border-black p-6 shrink-0">
                        <div className="max-w-7xl mx-auto flex justify-between items-end">
                            <div>
                                <h1 className="text-4xl font-serif italic tracking-tighter">焚風模擬器</h1>
                                <p className="text-[14px] uppercase font-bold tracking-widest opacity-40 mt-1">Foehn Wind Simulator v2.3</p>
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 overflow-hidden bg-white shadow-2xl my-4 border border-black/10">
                        {/* 左側：模擬區 */}
                        <div className="lg:col-span-7 p-6 border-r border-black/10 flex flex-col gap-6 bg-[#F9F9F7]">
                            {/* 控制面板 */}
                            <div className="bg-white p-6 border border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] space-y-6">
                                <div className="grid grid-cols-3 gap-6">
                                    {[
                                        { label: '初始溫度 (T₀)', val: initialTemp, unit: '°C', min: 0, max: 50, set: setInitialTemp },
                                        { label: '初始露點 (Td₀)', val: initialDewPoint, unit: '°C', min: 0, max: initialTemp, set: setInitialDewPoint },
                                        { label: '山脈高度 (H)', val: mountainHeight, unit: 'm', min: 500, max: 4000, set: setMountainHeight, step: 100 }
                                    ].map(ctrl => (
                                        <div key={ctrl.label}>
                                            <div className="flex justify-between text-[16px] font-bold uppercase opacity-80 mb-2">
                                                <span>{ctrl.label}</span>
                                                <span className="font-mono text-black opacity-100">{ctrl.val}{ctrl.unit}</span>
                                            </div>
                                            <input type="range" min={ctrl.min} max={ctrl.max} step={ctrl.step || 1} value={ctrl.val} onChange={e => ctrl.set(Number(e.target.value))} className="w-full cursor-pointer" />
                                        </div>
                                    ))}
                                </div>
                                <div className="flex items-center justify-between pt-4 border-t border-black/5">
                                    <span className="text-[14px] font-bold uppercase tracking-widest opacity-80">未飽和時露點是否隨高度變化 (±0.2°C/100m)</span>
                                    <div className="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                        <input 
                                            type="checkbox" id="toggle" checked={dewPointChanges}
                                            onChange={() => setDewPointChanges(!dewPointChanges)}
                                            className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"
                                        />
                                        <label htmlFor="toggle" className="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                                    </div>
                                </div>
                            </div>

                            {/* 模擬畫布 */}
                            <div 
                                ref={containerRef}
                                className="flex-grow relative bg-white border border-black overflow-hidden simulation-container cursor-crosshair"
                                onMouseDown={onMouseDown}
                                onMouseMove={onMouseMove}
                                onTouchStart={(e) => handleMove(e.touches[0].clientX)}
                                onTouchMove={(e) => handleMove(e.touches[0].clientX)}
                            >
                                <div className="absolute inset-0 opacity-[0.03]" style={{backgroundImage: 'linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                                
                                <svg className="w-full h-full" viewBox="0 0 800 450" preserveAspectRatio="none">
                                    {/* 縮小高度後的山脈地形：山頂位置設為 PEAK_Y */}
                                    <path d={`M 0 400 L 100 400 L 400 ${PEAK_Y} L 700 400 L 800 400`} fill="none" stroke="black" strokeWidth="2" />
                                    <path d={`M 0 400 L 100 400 L 400 ${PEAK_Y} L 700 400 L 800 400 L 800 450 L 0 450 Z`} fill="#A2F0A2" />
                                    
                                    {stats.lcl < mountainHeight && (
                                        <line 
                                            x1="0" y1={BASE_Y - (stats.lcl / mountainHeight) * VISUAL_HT} 
                                            x2="800" y2={BASE_Y - (stats.lcl / mountainHeight) * VISUAL_HT} 
                                            stroke="black" strokeDasharray="6,6" opacity="0.1" 
                                        />
                                    )}
                                </svg>

                                <div 
                                    className={`absolute w-20 h-20 rounded-full border-2 border-black flex flex-col items-center justify-center transition-colors duration-300 shadow-xl ${stats.isSaturated ? 'bg-black text-white' : 'bg-white text-black'}`}
                                    style={{
                                        left: `${progress <= 1 ? (100 + progress * 300) / 800 * 100 : (400 + (progress - 1) * 300) / 800 * 100}%`,
                                        bottom: `${((stats.height / mountainHeight) * VISUAL_HT + 50) / 450 * 100}%`,
                                        transform: 'translate(-50%, 50%)',
                                        pointerEvents: 'none'
                                    }}
                                >
                                    <span className="text-[14px] font-black leading-none">空氣塊</span>
                                    <div className="w-6 h-[1px] bg-current my-1 opacity-30"></div>
                                    <span className="text-[14px] font-bold opacity-60 uppercase">Parcel</span>
                                </div>

                                <div className="absolute top-6 left-6 text-[14px] font-black opacity-50 uppercase tracking-widest">迎風面 Windward</div>
                                <div className="absolute top-6 right-6 text-[14px] font-black opacity-50 uppercase tracking-widest text-right">背風面 Leeward</div>
                                
                                {stats.lcl < mountainHeight && (
                                    <div className="absolute text-[14px] font-mono font-bold opacity-30 bg-white/80 px-2" style={{left: '10px', bottom: `${((stats.lcl / mountainHeight) * VISUAL_HT + 50) / 450 * 100}%`}}>
                                        LCL: {stats.lcl}m
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* 右側：數據分析區 */}
                        <div className="lg:col-span-5 p-8 bg-white flex flex-col gap-8 relative">
                            {/* 重置按鈕移動至此 */}
                            <button 
                                onClick={() => setProgress(0)} 
                                className="absolute right-8 top-8 bg-black text-white px-4 py-2 text-[14px] font-bold uppercase tracking-widest hover:bg-gray-800 transition-all shadow-md active:scale-95 z-20"
                            >
                                重置位置 Reset
                            </button>

                            <div className="space-y-8 pt-4">
                                <DataRow label="當前高度 Height" value={stats.height} unit="m" />
                                <div className="h-[1px] bg-black/5"></div>
                                <DataRow label="當前溫度 Temp" value={stats.temp} unit="°C" />
                                <DataRow label="露點溫度 Dew Point" value={stats.dewPoint} unit="°C" />
                            </div>

                            <div className="flex gap-3 mt-4">
                                <div className={`px-4 py-2 text-[14px] font-black uppercase tracking-widest border transition-all ${progress <= 1 ? 'bg-black text-white shadow-lg' : 'border-black opacity-40'}`}>
                                    {progress <= 1 ? '上升中 Ascending' : '下降中 Descending'}
                                </div>
                                <div className={`px-4 py-2 text-[14px] font-black uppercase tracking-widest border transition-all ${stats.isSaturated ? 'bg-blue-600 text-white border-blue-600 shadow-lg' : 'border-black opacity-40'}`}>
                                    {stats.isSaturated ? '已飽和 Saturated' : '未飽和 Unsaturated'}
                                </div>
                            </div>

                            <div className="mt-auto bg-[#F5F5F0] p-6 border border-black/10 rounded">
                                <h3 className="text-[14px] font-black uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-black rounded-full"></span>
                                    物理原理說明
                                </h3>
                                <ul className="text-[14px] space-y-3 opacity-70 font-medium leading-relaxed">
                                    <li className="flex gap-3">
                                        <span className="font-bold opacity-20">01</span>
                                        <span><b>未飽和：</b>氣溫依乾絕熱率(1.0°C/100m)變化。若開啓變化，露點依0.2°C/100m變化。</span>
                                    </li>
                                    <li className="flex gap-3">
                                        <span className="font-bold opacity-20">02</span>
                                        <span><b>飽和：</b>溫度降至露點時，氣溫與露點皆依濕絕熱率(0.6°C/100m)下降。</span>
                                    </li>
                                    <li className="flex gap-3">
                                        <span className="font-bold opacity-20">03</span>
                                        <span><b>焚風效應：</b>下降時空氣變乾，始終以乾絕熱率升溫，形成乾熱風。</span>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
